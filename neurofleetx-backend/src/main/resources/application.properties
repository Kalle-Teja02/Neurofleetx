spring.application.name=neurofleetx-backend

# DB config — uses env vars in production, falls back to local defaults
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/neurofleetx}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Port — uses PORT env var in production (Render sets this), defaults to 8082 locally
server.port=${PORT:8082}

jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000
